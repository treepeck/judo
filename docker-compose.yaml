services:
  db:
    image: postgres:18.4-alpine3.24
    container_name: db
    ports:
      # Default Postgres port.
      - "5432:5432"
    env_file:
      - ./config/db.env
    # This allows to start the justchess service only when db is ready
    # to accepts new connections.  Otherwise justchess will crush after
    # first unsuccessfull connection try.
    healthcheck:
      test: pg_isready -d justchess -U admin
      retries: 2
      interval: 2s
      timeout: 2s
    volumes:
      - ./config/db.conf:/var/lib/postgresql/data/postgresql.conf:ro
      # Make db data persistent.
      - db_data:/var/lib/postgresql
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  justchess:
    build:
      context: .
      dockerfile: ./docker/justchess.Dockerfile
    container_name: justchess
    env_file:
      - ./config/justchess.env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3502:3502"
    volumes:
      # Mount source code from host OS.
      - ./repo/justchess:/app/src
      # Mount migrations from host OS.
      - ./db/migrations:/app/migrations
      - ./entrypoint.sh:/app/entrypoint.sh
    logging:
      options:
        max-size: "10m"
        max-file: "3"
    stop_grace_period: 1s
    entrypoint: /app/entrypoint.sh

  mailpit:
    image: axllent/mailpit
    container_name: mailpit
    ports:
      - "8025:8025"

  pgadmin:
    image: dpage/pgadmin4:9.16
    container_name: pgadmin
    env_file:
      - ./config/pgadmin.env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5050:80"
    volumes:
      # Mount configuration so that pgadmin automatically connects to DB.
      - ./config/pgadmin.json:/pgadmin4/servers.json
      - ./config/pgpass:/config/pgpass
    user: root
    entrypoint: /bin/sh -c "chown 5050:5050 /config/pgpass; chmod 600 /config/pgpass; /entrypoint.sh;"

volumes:
  db_data:
